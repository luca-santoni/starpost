# Default settings, copied to ~/.config/starpost/settings.yaml on first run.
# User edits the copy (or via the in-app Settings dialog), not this file.

# Path to the starccm+ executable. TODO: set the team's default install path.
starccm_path: ""

license:
  # mode: "podkey_server" (default) | "license_file"
  mode: podkey_server
  podkey: ""                 # Power-on-Demand key  -> -power -podkey <KEY>
  licpath: ""                # license server       -> -licpath <port>@<server>
  license_file: ""           # used only when mode == license_file -> -licpath <file>

# UI appearance. Changeable in-app via Settings -> Appearance.
appearance:
  mode: dark                 # "dark" | "light"
  accent: "#ffc829"          # hex accent colour applied program-wide
  # Colour of checkmarks (checkboxes, checked menu items) program-wide. When
  # checkmark_match_theme is true the accent colour is used and checkmark_color
  # is ignored.
  checkmark_color: "#ffc829"
  checkmark_match_theme: true

# Default folder for exports (CSV/JPG/PDF). Chosen per-run in the UI; this is the
# starting location of the picker. Empty = user's home.
default_output_dir: ""

# Extra arguments appended verbatim to every starccm+ invocation.
extra_args: []

# Show each loaded .sim with its full path in the Files panel. When false
# (default), only the file name is shown.
show_full_file_names: false

# Number of decimal places shown for report values in the table.
report_decimals: 4

# Hide reports whose value is ~0 from the report table.
hide_empty_reports: true

# Values whose absolute magnitude is below this are treated as 0 (shown as 0 and
# hidden when hide_empty_reports is on).
zero_threshold: 1.0e-5

# Hide monitor plots whose values are all ~0 from the plot view.
hide_empty_monitors: true

# Monitors whose values are all below this absolute magnitude are treated as 0
# (and hidden when hide_empty_monitors is on).
monitor_zero_threshold: 1.0e-5

# Include the monitor's name in the label shown when hovering over a plotted
# line. When false, only the point's coordinates are shown.
hover_show_monitor_name: true

# Number of decimal places shown for the X and Y coordinates in the hover label.
hover_x_decimals: 0
hover_y_decimals: 4

# Statistics listed in the table shown when Shift+dragging a region on the plot.
# Available: Avg, Median, Std Dev, Var, Min, Max, Range. Editable in-app via
# Settings -> Plots -> Statistics.
region_stats: [Avg, Std Dev, Range]

# Plot axis classification heuristics. A monitor plot whose name matches a
# residual keyword gets a log Y axis; force keywords get a linear axis. Any plot
# can be overridden per-plot in the UI or pinned in a profile.
plot_classification:
  residual_keywords: [residual, residuals]
  force_keywords: [force, drag, lift, moment, "cd", "cl"]
